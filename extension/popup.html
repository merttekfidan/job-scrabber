<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuntIQ</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img src="icons/icon48.png" width="20" height="20" alt="HuntIQ" style="border-radius: 4px;" />
        <span>HuntIQ</span>
      </div>
      <div id="userStatus" class="user-status">
        <span class="status-dot"></span>
        <span class="user-email">Connecting…</span>
      </div>
    </header>

    <!-- Already Applied Alert -->
    <div id="alreadyAppliedBadge" class="hidden"
      style="background-color: #f59e0b; color: #fffbeb; padding: 10px 14px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #d97706;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      <span>You have already saved this job.</span>
    </div>

    <main>
      <!-- Apply Button -->
      <button id="applyBtn" class="apply-btn">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5" />
        </svg>
        <span class="btn-text">Mark Applied</span>
      </button>

      <!-- Status Toast -->
      <div id="status" class="status hidden">
        <div class="status-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
        </div>
        <div class="status-text">Processing…</div>
      </div>

      <!-- Last Capture -->
      <div id="lastCapture" class="last-capture hidden">
        <div class="capture-info">
          <div class="capture-title"></div>
          <div class="capture-meta">
            <span class="capture-company"></span>
            <span class="capture-time"></span>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <button id="exportBtn" class="tool-btn" title="Export CSV">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>Export</span>
        </button>
        <button id="openDashboardBtn" class="tool-btn" title="Open Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          <span>Dashboard</span>
        </button>
        <button id="settingsToggle" class="tool-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          <span>Settings</span>
        </button>
      </div>

      <!-- Settings Panel (simplified) -->
      <div id="settingsPanel" class="settings-panel hidden">
        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="autoExport">
            Auto-export CSV on save
          </label>
        </div>
        <div class="setting-row" style="margin-top: 12px;">
          <label style="display: block; font-size: 11px; color: #9ca3af; margin-bottom: 4px;">Server Environment</label>
          <select id="environmentToggle"
            style="width: 100%; background: #374151; color: white; border: 1px solid #4b5563; border-radius: 4px; padding: 4px 8px; font-size: 12px; outline: none;">
            <option value="production">Production (Railway)</option>
            <option value="development">Local Development</option>
          </select>
        </div>
        <div class="version-info" style="display: flex; justify-content: space-between; align-items: center;">
          <span>v2.0.0 · AI Career Co-Pilot</span>
          <a href="#" id="privacyPolicyBtn" style="color: #9ca3af; text-decoration: underline; font-size: 11px;">Privacy
            Policy</a>
        </div>
      </div>

    </main>

    <footer>
      <span id="totalApps">0 tracked</span>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
